<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #6366f1;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --dark: #0f172a;
  --card: #ffffff;
  --bg: #f1f5f9;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--dark);
}

header {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  padding: 60px 20px;
  text-align: center;
}

header h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

header p {
  opacity: 0.9;
}

.container {
  max-width: 1100px;
  margin: -40px auto 60px;
  padding: 0 20px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  transition: 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  font-size: 0.9rem;
  font-weight: 600;
  opacity: 0.6;
}

.card .value {
  font-size: 2rem;
  font-weight: 700;
  margin: 10px 0;
}

.badge {
  font-size: 0.8rem;
  padding: 5px 10px;
  border-radius: 20px;
  display: inline-block;
}

.success { background: #dcfce7; color: var(--success); }
.warning { background: #fef3c7; color: var(--warning); }
.danger  { background: #fee2e2; color: var(--danger); }

.section {
  margin-top: 50px;
}

.section h2 {
  margin-bottom: 20px;
  font-size: 1.5rem;
}

.chart {
  background: var(--card);
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 20px;
  height: 200px;
}

.bar {
  flex: 1;
  background: var(--primary);
  border-radius: 8px 8px 0 0;
  position: relative;
  transition: 0.3s;
}

.bar:hover {
  opacity: 0.8;
}

.bar span {
  position: absolute;
  top: -25px;
  font-size: 0.8rem;
  font-weight: 600;
}

footer {
  text-align: center;
  padding: 40px 20px;
  font-size: 0.9rem;
  color: #64748b;
}
</style>
</head>
<body>

<header>
  <h1>Admin Dashboard Overview</h1>
  <p>Beautiful, responsive analytics preview</p>
</header>

<div class="container">

  <div class="stats">
    <div class="card">
      <h3>Total Clients</h3>
      <div class="value">2,847</div>
      <span class="badge success">+12.5%</span>
    </div>

    <div class="card">
      <h3>Revenue</h3>
      <div class="value">₹48,390</div>
      <span class="badge success">+8.2%</span>
    </div>

    <div class="card">
      <h3>Pending Orders</h3>
      <div class="value">326</div>
      <span class="badge warning">+2.4%</span>
    </div>

    <div class="card">
      <h3>Server Downtime</h3>
      <div class="value">0.02%</div>
      <span class="badge danger">-0.1%</span>
    </div>
  </div>

  <div class="section">
    <h2>Monthly Sales</h2>
    <div class="chart">
      <div class="bar-chart">
        <div class="bar" style="height: 60%;"><span>Jan</span></div>
        <div class="bar" style="height: 75%;"><span>Feb</span></div>
        <div class="bar" style="height: 50%;"><span>Mar</span></div>
        <div class="bar" style="height: 90%;"><span>Apr</span></div>
        <div class="bar" style="height: 70%;"><span>May</span></div>
        <div class="bar" style="height: 85%;"><span>Jun</span></div>
      </div>
    </div>
  </div>

</div>

<footer>
  © 2026 Admin Dashboard - Riskpro India
</footer>

</body>
</html>
